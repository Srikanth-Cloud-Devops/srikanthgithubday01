 name: Executing multiple jobs
 on: push
 jobs:
   build:
     runs-on: ubuntu-latest 
     steps: 
         - name: Print hello build
           run:  echo "this is build job"
   test:
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Print hello test
          run: echo "this is tested job"

   deploy:
      runs-on: ubuntu-latest
      needs: test
      steps:
        - name: Print hello deploy
          run: echo "this is deployment job"
